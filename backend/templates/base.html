<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 50px; line-height: 1.6; }
        .header { border-bottom: 2px solid #333; margin-bottom: 30px; }
        .content { white-space: pre-wrap; font-size: 18px; }
        .footer { margin-top: 50px; text-align: right; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ title }}</h1>
        <p>日付: {{ date }}</p>
    </div>
    <div class="content">{{ content }}</div>
    <div class="footer">作成者: {{ author }}</div>
</body>
</html>
