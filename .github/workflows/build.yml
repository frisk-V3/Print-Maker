name: frisk-V3-Full-Automation

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- Windows EXE ビルド ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Deps
        run: |
          pip install fastapi uvicorn playwright jinja2 pyinstaller
          playwright install chromium
      - name: PyInstaller Build
        run: |
          cd backend
          # 相対インポートエラー回避のため絶対パスで指定
          pyinstaller --onefile --noconsole --name frisk-V3-win --add-data "templates;templates" main.py
          mv dist/frisk-V3-win.exe ../frisk-V3-win.exe
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: frisk-V3-win.exe

  # --- Web (HTML/JS) ビルド ---
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Frontend Build
        run: |
          if [ -d "frontend" ]; then cd frontend; fi
          npm install
          npm run build
          cp -r dist ../web-dist
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist/

  # --- GitHub Release 公開 ---
  release:
    needs: [build-windows, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Zip Web
        run: zip -r frisk-V3-web.zip web-dist/
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3.${{ github.run_number }}
          name: "frisk-V3 Release #${{ github.run_number }}"
          files: |
            windows-binary/frisk-V3-win.exe
            frisk-V3-web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
