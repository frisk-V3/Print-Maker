name: frisk-V3-Instant-Build

on:
  push:
    branches: [ "main", "master" ] # メインブランチにプッシュで即起動
  workflow_dispatch: # 手動で「Run workflow」ボタンからも実行可能

permissions:
  contents: write

jobs:
  # --- Windows版 (.exe) のビルド ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 依存ライブラリとPyInstallerのインストール
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller
          
      - name: EXE作成 (本気ビルド)
        run: |
          # 1ファイルに固め、コンソールを出さない設定
          pyinstaller --onefile --noconsole --name frisk-V3 backend/main.py
          
      - name: 成果物を保存
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/frisk-V3.exe

  # --- Web版 (HTML/JS) のビルド ---
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: フロントエンドビルド
        run: |
          cd frontend
          npm install
          npm run build
      - name: 成果物を保存
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist/

  # --- 自動リリース (EXEとHTMLを載せる) ---
  create-release:
    needs: [build-windows, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: すべての成果物をダウンロード
        uses: actions/download-artifact@v4
        
      - name: 自動リリース作成
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }} # 実行番号をタグにする
          name: "frisk-V3 Auto Build #${{ github.run_number }}"
          files: |
            windows-binary/frisk-V3.exe
          body: "GitHub Actionsによる本気の自動ビルドです。Windows版EXEが生成されました。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
